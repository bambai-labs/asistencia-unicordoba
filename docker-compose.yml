version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3100}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:z9j1v3up0jmsgzge@72.62.173.113:27017/asistencia_unicordoba}
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_URL=${SERVER_URL:-https://asistencia-unicor-api.bambai.dev}
    ports:
      - "3100:${PORT:-3100}"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - dokploy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Frontend Web
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://asistencia-unicor-api.bambai.dev/api}
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      - dokploy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  uploads_data:
    driver: local
    name: asistencia_uploads_data

networks:
  dokploy-network:
    external: true
